# Public GlyphOS AI Compute configuration

ai_compute:
  local:
    preferred_local_backend: "llamacpp"

  llamacpp:
    enabled: true
    url: "http://127.0.0.1:8081/v1"
    model: ""
    timeout: 300

  ollama:
    enabled: true
    url: "http://localhost:11434"
    model: "llama3:70b"
    timeout: 30

  openai:
    enabled: false
    model: "gpt-4-turbo-preview"

  anthropic:
    enabled: false
    model: "claude-3-sonnet-20240229"

  xai:
    enabled: false
    model: "grok-beta"

  lanes:
    aurora: {}
    terran: {}
    starlight: {}
    polaris: {}

  routing:
    high_coherence_threshold: 0.8
    low_coherence_threshold: 0.3
    complex_actions:
      - ANALYZE
      - SYNTHESIZE
      - PREDICT
      - LEARN
      - TEACH

glyph:
  default_psi: 0.5

pulse:
  instance_id: "glyphos-default"
  frequency_hz: 528.0
  version: "1.0.0"

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
